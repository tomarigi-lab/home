<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>とまり木</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="site-identity">
        <p class="site-name">とまり木</p>
        <p class="site-handle">tomarigi_lab</p>
      </div>

      <nav class="site-nav" aria-label="メインナビゲーション">
        <a href="#about">About</a>
        <a href="https://www.instagram.com/tomarigi_lab/" target="_blank" rel="noopener noreferrer">Instagram</a>
      </nav>
    </div>

    <p class="site-intro">一枚の絵と言葉を、ゆっくりと。</p>
  </header>

  <main class="site-main">
    <article class="featured-artwork">

      <figure class="artwork-frame">
        <img src="images/arigatou.jpg" alt="ありがとう">
      </figure>

      <div class="artwork-caption">
        <h2 class="artwork-title">ありがとう</h2>
        <p class="artwork-text">伝えられなかった「ありがとう」を、<br>新しくはじまる物語への祝福と一緒に描きました。</p>
      </div>

    </article>

    <section class="about-section" id="about">
      <p>絵と言葉で、誰かの心が少しほどける時間を描いています。</p>
      <p>節目の記憶や、うまく言葉にできなかった気持ちを、一枚の絵に残します。</p>
    </section>
  </main>

  <footer class="site-footer">
    <nav class="footer-links">
      <a class="footer-link" href="https://www.instagram.com/tomarigi_lab/" target="_blank" rel="noopener noreferrer">Instagram</a>
    </nav>
    <p>&copy; 2026 tomarigi_lab</p>
  </footer>
</body>
</html>
